<!DOCTYPE html>
<html>
<head>
    <title>OpenAI Debug Test</title>
</head>
<body>
    <h1>OpenAI API Debug Test</h1>
    <button onclick="testApiKey()">Test API Key</button>
    <button onclick="testSimpleCall()">Test Simple API Call</button>
    <div id="output" style="white-space: pre-wrap; font-family: monospace; margin-top: 20px; border: 1px solid #ccc; padding: 10px;"></div>

    <script>
        function log(message) {
            const output = document.getElementById('output');
            output.textContent += new Date().toISOString() + ': ' + message + '\n';
            console.log(message);
        }

        async function testApiKey() {
            log('=== Testing API Key ===');
            
            // Try to get API key from localStorage (if that's where your app stores it)
            const apiKey = localStorage.getItem('openaiApiKey') || 
                          localStorage.getItem('apiKey') || 
                          prompt('Enter your OpenAI API key:');
            
            if (!apiKey) {
                log('ERROR: No API key provided');
                return;
            }
            
            log('API Key exists: ' + !!apiKey);
            log('API Key length: ' + apiKey.length);
            log('API Key starts with sk-: ' + apiKey.startsWith('sk-'));
            log('API Key first 10 chars: ' + apiKey.substring(0, 10) + '...');
        }

        async function testSimpleCall() {
            log('=== Testing Simple API Call ===');
            
            const apiKey = localStorage.getItem('openaiApiKey') || 
                          localStorage.getItem('apiKey') || 
                          prompt('Enter your OpenAI API key:');
            
            if (!apiKey || !apiKey.startsWith('sk-')) {
                log('ERROR: Invalid API key format');
                return;
            }

            try {
                log('Making API call...');
                
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o',
                        messages: [
                            {
                                role: 'user',
                                content: 'Say "Hello World" and return only JSON: {"message": "Hello World", "status": "success"}'
                            }
                        ],
                        temperature: 0.1,
                        max_tokens: 100
                    })
                });

                log('Response status: ' + response.status);
                log('Response ok: ' + response.ok);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log('ERROR Response: ' + errorText);
                    return;
                }

                const data = await response.json();
                log('Response data keys: ' + Object.keys(data).join(', '));
                log('Choices length: ' + (data.choices?.length || 0));
                
                if (data.choices && data.choices[0]) {
                    log('Content: ' + data.choices[0].message.content);
                } else {
                    log('ERROR: No content in response');
                    log('Full response: ' + JSON.stringify(data, null, 2));
                }
                
            } catch (error) {
                log('ERROR: ' + error.message);
                log('Error stack: ' + error.stack);
            }
        }
    </script>
</body>
</html>
